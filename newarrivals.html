<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What's New In Store</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        background-color: floralwhite;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #111;
      }
      #heading {
        text-align: center;
        font-family: fantasy;
        font-size: clamp(2.5rem, 6vw, 4rem);
        margin-bottom: 16px;
      }
      #bannerimg {
        padding: 20px;
        border-radius: 50px;
        overflow: hidden;
      }
      #bannerimg img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 50px;
      }
      #dunks,
      #AIRFORCES,
      #Jordans {
        padding: 20px;
      }
      .section-title {
        font-size: clamp(2rem, 4vw, 2.5rem);
        font-family: fantasy;
        margin-bottom: 18px;
      }
      .dunks_separate_images {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
      }
      .dunks_separate_images div {
        flex: 1 1 320px;
        display: flex;
        justify-content: center;
      }
      .dunks_separate_images img {
        width: 100%;
        max-width: 600px;
        height: auto;
        border-radius: 20px;
      }
      @media (max-width: 720px) {
        body {
          padding: 12px;
        }
        #bannerimg {
          padding: 12px;
        }
        .section-title {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <p id="heading">Heats</p>
    <div id="bannerimg">
      <img src="images/banner.png" alt="banner image" />
    </div>
    <div id="dunks">
      <p class="section-title">DUNKS</p>
      <div class="dunks_separate_images">
        <div><img src="images/dunksimg1.jpg" alt="dunks image 1" /></div>
        <div><img src="images/img4.jpeg" alt="dunks image 2" /></div>
      </div>
    </div>
    <div id="AIRFORCES">
      <p class="section-title">AIRFORCES</p>
      <div class="dunks_separate_images">
        <div><img src="images/airforces1.png" alt="airforces image 1" /></div>
        <div><img src="images/airfoces2.png" alt="airforces image 2" /></div>
      </div>
    </div>
    <div id="Jordans">
      <p class="section-title">JORDANS</p>
      <div class="dunks_separate_images">
        <div><img src="images/jordans1.png" alt="jordans image 1" /></div>
        <div><img src="images/jordans2.png" alt="jordans image 2" /></div>
      </div>
    </div>
  </body>
</html>
